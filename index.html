<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XYZ-COMPANY</title>
<style>
    body {
        margin: 0;
    }

    .header { 
        background: #140a5c;
        color: white;
        text-align: center;
        padding: 30px 0;
    }

    .container {
        background: rgb(212, 210, 210);
        width: 60%;
        margin: -40px auto;
        padding: 30px;
        border-radius: 5px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    input, select {
        padding: 8px;
        width: 150px;
    }

    button {
        background: #140a5c;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
    }
    .result {
        font-weight: bold;
        font-size: 18px;
    }
</style>
</head>

<body>

<div class="header">
    <h2>XYZ-COMPANY</h2>
    <p>CURRENCY EXCHANGE PLATFORM</p>
</div>

<div class="container">

    <div class="row">
        <div>
            <label>Amount</label><br>
            <input type="number" id="amount" value="">
        </div>

        <div>
            <label>From</label><br>
            <select id="from">
                <option value="USD">USD - $</option>
                <option value="RWF">RWF</option>
                <option value="EURO">EURO</option>
            </select>
        </div>

        <div>
            <label>To</label><br>
            <select id="to">
                <option value="RWF">Rwanda - RWF</option>
                <option value="USD">USD - $</option>
                <option value="EURO">EURO</option>
            </select>
        </div>
    </div>

    <button onclick="convert()">Convert</button>

    <p>Result</p>
    <div class="result" id="result">0</div>

</div>

<script>
function convert() { 
     const amount = document.getElementById("amount").value;
     const from = document.getElementById("from").value;
     const to = document.getElementById("to").value;
     if( amount>0 ){
    if (from === "USD" && to === "RWF") {
        rate = 1460;
    } else if (from === "RWF" && to === "USD") {
        rate = 1 / 1460;
    }
    else if (from === "EURO" && to === "RWF") {
        rate =  1700;
    }
       else if (from === "RWF" && to === "EURO") {
        rate = 1 / 1700;
    }
       else if (from === "EURO" && to === "EURO") {
        rate = 1;
    }
    else if (from === "USD" && to === "USD") {
        rate = 1;
    }
    else if (from === "RWF" && to === "RWF") {
        rate = 1;
    }
    else if (from === "USD" && to === "EURO") {
        rate = 0.85;
    }
    else if (from === "EURO" && to === "USD") {
        rate = 1.17;
    }
   } 
    else{
        window.alert("invilade option")
    }
    const result = amount * rate;
    document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
